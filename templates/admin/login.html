{% extends 'base.html' %}
{% block title %}Вход для персонала | AutoKey{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card admin-login-card">
        <div class="admin-icon-wrap">
            <div class="admin-icon">🛡️</div>
        </div>

        <div class="admin-head">
            <h2>Вход для персонала</h2>
            <p>Только для администратора и менеджера</p>
        </div>

        <form method="POST" class="admin-login-form" autocomplete="on">
            <div class="form-group">
                <label for="username">ЛОГИН</label>
                <div class="input-shell input-shell-lg">
                    <span class="input-icon">👤</span>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Введите логин"
                        value="{{ request.form.get('username', '') }}"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">ПАРОЛЬ</label>
                <div class="input-shell">
                    <span class="input-icon">🔒</span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Введите пароль"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="admin-submit">
                Войти в панель →
            </button>

            <div class="admin-divider">
                <span>или</span>
            </div>

            <div class="admin-links">
                <a href="{{ url_for('login') }}" class="admin-link">🔐 Обычный вход</a>
                <a href="{{ url_for('index') }}" class="admin-link">🏠 На главную</a>
            </div>
        </form>
    </div>
</section>

<style>
.auth-shell{
    min-height:calc(100vh - 180px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}

.admin-login-card{
    width:100%;
    max-width:520px;
    padding:34px 34px 28px;
    border-radius:28px;
    background:linear-gradient(145deg, rgba(16,26,47,.97), rgba(23,39,71,.96));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 24px 60px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.04);
}

.admin-icon-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
}

.admin-icon{
    width:74px;
    height:74px;
    border-radius:22px;
    display:grid;
    place-items:center;
    font-size:30px;
    color:#fff;
    background:linear-gradient(135deg, #223d86, #1bd3d0);
    box-shadow:0 16px 34px rgba(27,211,208,.18);
}

.admin-head{
    text-align:center;
    margin-bottom:24px;
}

.admin-head h2{
    margin:0 0 10px;
    font-size:clamp(30px, 4vw, 40px);
    color:#ffffff;
    font-weight:800;
}

.admin-head p{
    margin:0;
    color:rgba(220,231,255,.62);
}

.admin-login-form{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#dbe6ff;
    font-size:13px;
    font-weight:700;
    letter-spacing:.04em;
}

.input-shell{
    display:flex;
    align-items:center;
    min-height:58px;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    overflow:hidden;
    transition:.2s ease;
}

.input-shell:focus-within{
    border-color:rgba(109,124,255,.72);
    box-shadow:0 0 0 4px rgba(109,124,255,.14);
    background:rgba(255,255,255,.08);
}

.input-shell-lg{
    border-color:rgba(109,124,255,.55);
    box-shadow:0 0 0 4px rgba(109,124,255,.10);
}

.input-icon{
    width:48px;
    display:grid;
    place-items:center;
    flex-shrink:0;
    font-size:16px;
    color:rgba(173,191,255,.9);
}

.input-shell input{
    width:100%;
    height:58px;
    border:none !important;
    outline:none !important;
    background:transparent !important;
    background-color:transparent !important;
    box-shadow:none !important;
    color:#f3f7ff !important;
    padding:16px 18px 16px 0 !important;
    -webkit-appearance:none;
    appearance:none;
    font-size:16px;
}

.input-shell input::placeholder{
    color:rgba(219,230,255,.38) !important;
}

.input-shell input:focus,
.input-shell input:active{
    background:transparent !important;
    background-color:transparent !important;
    color:#ffffff !important;
    box-shadow:none !important;
    border:none !important;
    outline:none !important;
}

.input-shell input:-webkit-autofill,
.input-shell input:-webkit-autofill:hover,
.input-shell input:-webkit-autofill:focus,
.input-shell input:-webkit-autofill:active{
    -webkit-text-fill-color:#ffffff !important;
    -webkit-box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    transition:background-color 9999s ease-in-out 0s;
    border:none !important;
}

.form-group input,
.form-control{
    background:transparent !important;
    background-color:transparent !important;
    color:#f3f7ff !important;
    border:none !important;
    box-shadow:none !important;
}

.form-control:focus{
    background:transparent !important;
    background-color:transparent !important;
    color:#ffffff !important;
    border:none !important;
    box-shadow:none !important;
}

.admin-submit{
    margin-top:6px;
    min-height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, #223d86, #1bd3d0);
    color:#ffffff;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
}

.admin-submit:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(27,211,208,.18);
}

.admin-divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:8px;
    color:rgba(255,255,255,.42);
}

.admin-divider::before,
.admin-divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,.10);
}

.admin-links{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
}

.admin-link{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    border-radius:16px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    color:#dce6ff;
    text-decoration:none;
    font-weight:600;
    transition:.2s ease;
}

.admin-link:hover{
    background:rgba(255,255,255,.08);
    color:#ffffff;
}

@media (max-width:760px){
    .admin-login-card{
        padding:24px 18px 20px;
        border-radius:22px;
    }

    .admin-links{
        grid-template-columns:1fr;
    }
}
</style>
{% endblock %}
