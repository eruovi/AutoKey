{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}

<div class="auth-card" style="max-width:700px; margin:0 auto;">
    <div class="section-head">
        <h2>Регистрация</h2>
        <p>Создайте аккаунт, чтобы оформлять заявки и следить за их статусом в личном кабинете.</p>
    </div>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" name="first_name" required>
            </div>

            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" name="last_name" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Логин</label>
                <input type="text" name="username" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group" style="display:flex; gap:10px; align-items:flex-start;">
            <input type="checkbox" name="consent" id="consent" required style="width:auto; margin-top:4px;">
            <label for="consent" style="line-height:1.6;">
                Я соглашаюсь на обработку персональных данных и принимаю
                <a href="{{ url_for('privacy') }}" target="_blank">политику конфиденциальности</a>.
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
</div>

{% endblock %}
