{% extends 'base.html' %}
{% block title %}Регистрация | Автоключи 33{% endblock %}
{% block content %}
<section class="content-card" style="max-width:560px;margin:0 auto;">
    <div class="section-head">
        <h2>Регистрация</h2>
        <p>Создайте аккаунт, чтобы отслеживать свои заявки в личном кабинете.</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Логин</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Создать аккаунт</button>
    </form>
    <p style="margin-top:16px;color:#6b7280;">Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color:#0f766e;font-weight:700;">Войти</a></p>
</section>
{% endblock %}
