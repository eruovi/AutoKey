{% extends 'base.html' %}
{% block title %}Регистрация | AutoKey{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card register-card">
        <div class="register-icon-wrap">
            <div class="register-icon">🔑</div>
        </div>

        <div class="register-head">
            <h2>Создать аккаунт</h2>
            <p>Заполните форму для регистрации</p>
        </div>

        <div class="register-required-note">
            <span>*</span> — обязательные поля
        </div>

        <form method="POST" class="register-form" autocomplete="on" novalidate>
            <div class="form-group">
                <label for="full_name">ФИО <span class="req">*</span></label>
                <div class="input-shell input-shell-lg">
                    <span class="input-icon">👤</span>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Иванов Иван Иванович"
                        value="{{ request.form.get('full_name', '') }}"
                        required
                    >
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <div class="input-shell">
                        <span class="input-icon">✉️</span>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="mail@example.com"
                            value="{{ request.form.get('email', '') }}"
                            inputmode="email"
                            autocomplete="email"
                            pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                            title="Используйте только латинские буквы, цифры и символы email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone">ТЕЛЕФОН</label>
                    <div class="input-shell">
                        <span class="input-icon">📞</span>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+7 (___) ___-__-__"
                            value="{{ request.form.get('phone', '') }}"
                            inputmode="numeric"
                            autocomplete="tel"
                            maxlength="18"
                        >
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="username">ЛОГИН <span class="req">*</span></label>
                <div class="input-shell">
                    <span class="input-icon">📌</span>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Придумайте логин"
                        value="{{ request.form.get('username', '') }}"
                        required
                    >
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="password">ПАРОЛЬ <span class="req">*</span></label>
                    <div class="input-shell">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Мин. 6 символов"
                            required
                            minlength="6"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password2">ПОВТОРИТЕ ПАРОЛЬ <span class="req">*</span></label>
                    <div class="input-shell">
                        <span class="input-icon">🔐</span>
                        <input
                            type="password"
                            id="password2"
                            name="password2"
                            placeholder="Повторите пароль"
                            required
                            minlength="6"
                        >
                    </div>
                </div>
            </div>

            <label class="register-policy">
                <input
                    type="checkbox"
                    name="policy"
                    required
                    {% if request.form.get('policy') %}checked{% endif %}
                >
                <span>
                    Я согласен с
                    <a href="{{ url_for('privacy') }}" target="_blank" rel="noopener noreferrer">
                        Политикой конфиденциальности
                    </a>
                    и даю согласие на обработку персональных данных в соответствии с 152-ФЗ.
                </span>
            </label>

            <button type="submit" class="register-submit">
                Создать аккаунт →
            </button>

            <div class="register-divider">
                <span>или</span>
            </div>

            <div class="register-links">
                <a href="{{ url_for('index') }}" class="register-link">🏠 На главную</a>
                <a href="{{ url_for('login') }}" class="register-link">🔑 Уже есть аккаунт</a>
            </div>
        </form>
    </div>
</section>

<script>
const registerPhoneInput = document.getElementById('phone');
const registerEmailInput = document.getElementById('email');
const registerForm = document.querySelector('.register-form');

function maskPhone(value) {
    let digits = value.replace(/\D/g, '');

    if (digits.startsWith('8')) digits = '7' + digits.slice(1);
    if (!digits.startsWith('7')) digits = '7' + digits.replace(/^7*/, '');
    digits = digits.slice(0, 11);

    let result = '+7';
    if (digits.length > 1) result += ' (' + digits.slice(1, 4);
    if (digits.length >= 4) result += ') ' + digits.slice(4, 7);
    if (digits.length >= 7) result += '-' + digits.slice(7, 9);
    if (digits.length >= 9) result += '-' + digits.slice(9, 11);

    return result;
}

registerPhoneInput.addEventListener('input', function () {
    this.value = maskPhone(this.value);
});

registerPhoneInput.addEventListener('focus', function () {
    if (!this.value) this.value = '+7';
});

registerPhoneInput.addEventListener('blur', function () {
    if (this.value === '+7') this.value = '';
});

registerEmailInput.addEventListener('input', function () {
    this.value = this.value.replace(/[^A-Za-z0-9@._%+-]/g, '');
});

registerForm.addEventListener('submit', function (e) {
    const phoneValue = registerPhoneInput.value.trim();
    const phoneDigits = phoneValue.replace(/\D/g, '');
    const emailValue = registerEmailInput.value.trim();

    if (phoneValue && phoneDigits.length !== 11) {
        e.preventDefault();
        registerPhoneInput.focus();
        alert('Введите телефон полностью в формате +7 (999) 999-99-99');
        return;
    }

    if (emailValue && !/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(emailValue)) {
        e.preventDefault();
        registerEmailInput.focus();
        alert('Email должен содержать только латинские буквы и корректный формат адреса');
        return;
    }
});
</script>

<style>
.auth-shell{
    min-height:calc(100vh - 180px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}

.register-card{
    width:100%;
    max-width:620px;
    padding:34px 34px 28px;
    border-radius:28px;
    background:linear-gradient(145deg, rgba(16,26,47,.97), rgba(23,39,71,.96));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 24px 60px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.04);
}

.register-icon-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
}

.register-icon{
    width:74px;
    height:74px;
    border-radius:22px;
    display:grid;
    place-items:center;
    font-size:30px;
    color:#fff;
    background:linear-gradient(135deg, #4f7cff, #7a5cff);
    box-shadow:0 16px 34px rgba(79,124,255,.30);
}

.register-head{
    text-align:center;
    margin-bottom:22px;
}

.register-head h2{
    margin:0 0 10px;
    font-size:clamp(30px, 4vw, 42px);
    color:#ffffff;
    font-weight:800;
}

.register-head p{
    margin:0;
    color:rgba(220,231,255,.62);
}

.register-required-note{
    margin-bottom:18px;
    color:rgba(220,231,255,.55);
    font-size:14px;
}

.register-required-note span,
.req{
    color:#ff7f97;
    font-weight:700;
}

.register-form{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:16px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    color:#dbe6ff;
    font-size:13px;
    font-weight:700;
    letter-spacing:.04em;
}

.input-shell{
    display:flex;
    align-items:center;
    min-height:58px;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    overflow:hidden;
    transition:.2s ease;
    backdrop-filter:blur(14px);
}

.input-shell:focus-within{
    border-color:rgba(109,124,255,.72);
    box-shadow:0 0 0 4px rgba(109,124,255,.14);
    background:rgba(255,255,255,.08);
}

.input-shell-lg{
    border-color:rgba(109,124,255,.55);
    box-shadow:0 0 0 4px rgba(109,124,255,.10);
}

.input-icon{
    width:48px;
    display:grid;
    place-items:center;
    flex-shrink:0;
    font-size:16px;
    color:rgba(173,191,255,.9);
}

.input-shell input{
    width:100%;
    height:58px;
    border:none !important;
    outline:none !important;
    background:transparent !important;
    background-color:transparent !important;
    box-shadow:none !important;
    color:#f3f7ff !important;
    padding:16px 18px 16px 0 !important;
    -webkit-appearance:none;
    appearance:none;
    font-size:16px;
}

.input-shell input::placeholder{
    color:rgba(219,230,255,.38) !important;
}

.input-shell input:focus,
.input-shell input:active{
    background:transparent !important;
    background-color:transparent !important;
    color:#ffffff !important;
    box-shadow:none !important;
    border:none !important;
    outline:none !important;
}

.input-shell input:-webkit-autofill,
.input-shell input:-webkit-autofill:hover,
.input-shell input:-webkit-autofill:focus,
.input-shell input:-webkit-autofill:active{
    -webkit-text-fill-color:#ffffff !important;
    -webkit-box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    transition:background-color 9999s ease-in-out 0s;
    border:none !important;
}

.form-group input,
.form-group select,
.form-group textarea,
.form-control{
    background:transparent !important;
    background-color:transparent !important;
    color:#f3f7ff !important;
    border:none !important;
    box-shadow:none !important;
}

.form-control:focus{
    background:transparent !important;
    background-color:transparent !important;
    color:#ffffff !important;
    border:none !important;
    box-shadow:none !important;
}

.register-policy{
    display:flex;
    gap:12px;
    align-items:flex-start;
    color:rgba(255,255,255,.76);
    line-height:1.5;
    margin-top:4px;
}

.register-policy input{
    margin-top:3px;
    width:18px;
    height:18px;
    accent-color:#5ee7df;
    flex-shrink:0;
}

.register-policy a{
    color:#9fc5ff;
    text-decoration:underline;
    text-underline-offset:3px;
}

.register-submit{
    margin-top:6px;
    min-height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, #1bd3d0, #7cf0e0);
    color:#0d1b2f;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
}

.register-submit:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 28px rgba(27,211,208,.22);
}

.register-divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:8px;
    color:rgba(255,255,255,.42);
}

.register-divider::before,
.register-divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,.10);
}

.register-links{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
}

.register-link{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    border-radius:16px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    color:#dce6ff;
    text-decoration:none;
    font-weight:600;
    transition:.2s ease;
}

.register-link:hover{
    background:rgba(255,255,255,.08);
    color:#ffffff;
}

@media (max-width:760px){
    .register-card{
        padding:24px 18px 20px;
        border-radius:22px;
    }

    .form-grid,
    .register-links{
        grid-template-columns:1fr;
    }
}
</style>
{% endblock %}
