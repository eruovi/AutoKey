{% extends 'base.html' %}
{% block title %}Вход | Автоключи 33{% endblock %}
{% block content %}
<section class="content-card" style="max-width:560px;margin:0 auto;">
    <div class="section-head">
        <h2>Вход в аккаунт</h2>
        <p>Войдите, чтобы смотреть свои заявки и их статусы.</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Логин</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    <p style="margin-top:16px;color:#6b7280;">Нет аккаунта? <a href="{{ url_for('register') }}" style="color:#0f766e;font-weight:700;">Зарегистрироваться</a></p>
</section>
{% endblock %}
