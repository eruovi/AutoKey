{% extends 'base.html' %}
{% block title %}Новый пароль | AutoKey{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card auth-card-sm">
        <div class="auth-icon-wrap">
            <div class="auth-icon">🔑</div>
        </div>

        <div class="auth-head">
            <h2>Новый пароль</h2>
            <p>Введите новый пароль и подтвердите его</p>
        </div>

        <form method="POST" class="auth-form" autocomplete="on">
            <div class="form-group">
                <label for="password">НОВЫЙ ПАРОЛЬ</label>
                <div class="input-shell input-shell-lg">
                    <span class="input-icon">🔒</span>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Минимум 6 символов"
                        required
                        minlength="6"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">ПОВТОРИТЕ ПАРОЛЬ</label>
                <div class="input-shell">
                    <span class="input-icon">🔐</span>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Повторите пароль"
                        required
                        minlength="6"
                    >
                </div>
            </div>

            <button type="submit" class="auth-submit">
                Сохранить пароль →
            </button>

            <div class="auth-divider">
                <span>или</span>
            </div>

            <div class="auth-links">
                <a href="{{ url_for('login') }}" class="auth-link">🔐 Ко входу</a>
                <a href="{{ url_for('index') }}" class="auth-link">🏠 На главную</a>
            </div>
        </form>
    </div>
</section>

<style>
.auth-shell{
    min-height:calc(100vh - 180px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}
.auth-card{
    width:100%;
    padding:34px 34px 28px;
    border-radius:28px;
    background:linear-gradient(145deg, rgba(16,26,47,.97), rgba(23,39,71,.96));
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 24px 60px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
}
.auth-card-sm{
    max-width:520px;
}
.auth-icon-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:18px;
}
.auth-icon{
    width:74px;
    height:74px;
    border-radius:22px;
    display:grid;
    place-items:center;
    font-size:30px;
    color:#fff;
    background:linear-gradient(135deg, #4f7cff, #7a5cff);
    box-shadow:0 16px 34px rgba(79,124,255,.24);
}
.auth-head{
    text-align:center;
    margin-bottom:24px;
}
.auth-head h2{
    margin:0 0 10px;
    font-size:clamp(30px, 4vw, 40px);
    color:#fff;
    font-weight:800;
}
.auth-head p{
    margin:0;
    color:rgba(220,231,255,.62);
}
.auth-form{
    display:flex;
    flex-direction:column;
    gap:16px;
}
.form-group label{
    display:block;
    margin-bottom:8px;
    color:#dbe6ff;
    font-size:13px;
    font-weight:700;
    letter-spacing:.04em;
}
.input-shell{
    display:flex;
    align-items:center;
    min-height:58px;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);
    overflow:hidden;
    transition:.2s ease;
}
.input-shell:focus-within{
    border-color:rgba(109,124,255,.72);
    box-shadow:0 0 0 4px rgba(109,124,255,.14);
    background:rgba(255,255,255,.08);
}
.input-shell-lg{
    border-color:rgba(109,124,255,.55);
    box-shadow:0 0 0 4px rgba(109,124,255,.10);
}
.input-icon{
    width:48px;
    display:grid;
    place-items:center;
    flex-shrink:0;
    font-size:16px;
    color:rgba(173,191,255,.9);
}
.input-shell input{
    width:100%;
    height:58px;
    border:none !important;
    outline:none !important;
    background:transparent !important;
    background-color:transparent !important;
    box-shadow:none !important;
    color:#f3f7ff !important;
    padding:16px 18px 16px 0 !important;
    -webkit-appearance:none;
    appearance:none;
    font-size:16px;
}
.input-shell input::placeholder{
    color:rgba(219,230,255,.38) !important;
}
.input-shell input:-webkit-autofill,
.input-shell input:-webkit-autofill:hover,
.input-shell input:-webkit-autofill:focus,
.input-shell input:-webkit-autofill:active{
    -webkit-text-fill-color:#ffffff !important;
    -webkit-box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    box-shadow:0 0 0 1000px rgba(36,48,78,1) inset !important;
    transition:background-color 9999s ease-in-out 0s;
}
.auth-submit{
    margin-top:6px;
    min-height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, #1bd3d0, #7cf0e0);
    color:#0d1b2f;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
}
.auth-divider{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:8px;
    color:rgba(255,255,255,.42);
}
.auth-divider::before,
.auth-divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,.10);
}
.auth-links{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:14px;
}
.auth-link{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:48px;
    border-radius:16px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    color:#dce6ff;
    text-decoration:none;
    font-weight:600;
}
.auth-link:hover{
    background:rgba(255,255,255,.08);
    color:#fff;
}
@media (max-width:760px){
    .auth-card{
        padding:24px 18px 20px;
        border-radius:22px;
    }
    .auth-links{
        grid-template-columns:1fr;
    }
}
</style>
{% endblock %}
