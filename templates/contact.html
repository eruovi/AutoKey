{% extends 'base.html' %}
{% block title %}Оставить заявку{% endblock %}
{% block content %}

<div class="content-card" style="max-width:860px; margin:0 auto;">
    <div class="section-head">
        <h2>Оставить заявку</h2>
        <p>Заполните форму, и мы свяжемся с вами для уточнения деталей.</p>
    </div>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" name="first_name" required value="{{ user.first_name if user else '' }}">
            </div>

            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" name="last_name" required value="{{ user.last_name if user else '' }}">
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input
                    type="tel"
                    name="phone"
                    placeholder="+79991234567"
                    inputmode="numeric"
                    pattern="^\+7[0-9]{10}$"
                    maxlength="12"
                    required
                    oninput="this.value = this.value.replace(/[^0-9+]/g, ''); if (!this.value.startsWith('+')) { this.value = '+' + this.value.replace(/\+/g, ''); } if (this.value.indexOf('+') > 0) { this.value = '+' + this.value.replace(/\+/g, ''); } this.value = this.value.slice(0, 12);"
                >
            </div>

            <div class="form-group">
                <label class="form-label">Услуга</label>
                <select name="service" required>
                    <option value="">Выберите услугу</option>
                    <option>Изготовление ключа</option>
                    <option>Программирование чип-ключа</option>
                    <option>Аварийное вскрытие автомобиля</option>
                    <option>Ремонт замка зажигания</option>
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Марка автомобиля</label>
                <select name="brand" id="brand-select" required>
                    <option value="">Выберите марку</option>
                    {% for brand in car_brands.keys() %}
                        <option value="{{ brand }}">{{ brand }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Модель автомобиля</label>
                <select name="car_model" id="model-select" required>
                    <option value="">Сначала выберите марку</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Отправить заявку</button>
    </form>
</div>

<script>
    const carBrands = {{ car_brands | tojson }};
    const brandSelect = document.getElementById('brand-select');
    const modelSelect = document.getElementById('model-select');

    brandSelect.addEventListener('change', function () {
        const brand = this.value;
        const models = carBrands[brand] || [];

        modelSelect.innerHTML = '<option value="">Выберите модель</option>';

        models.forEach(model => {
            const option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            modelSelect.appendChild(option);
        });
    });
</script>

{% endblock %}
