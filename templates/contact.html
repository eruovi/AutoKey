{% extends 'base.html' %}
{% block title %}Оставить заявку{% endblock %}
{% block content %}

<div class="content-card" style="max-width:860px; margin:0 auto;">
    <div class="section-head">
        <h2>Оставить заявку</h2>
        <p>Заполните форму, и мы свяжемся с вами для уточнения деталей.</p>
    </div>

    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="first_name">Имя</label>
                <input
                    type="text"
                    id="first_name"
                    name="first_name"
                    required
                    value="{{ request.form.get('first_name', user.first_name if user else '') }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="last_name">Фамилия</label>
                <input
                    type="text"
                    id="last_name"
                    name="last_name"
                    required
                    value="{{ request.form.get('last_name', user.last_name if user else '') }}"
                >
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="phone">Телефон</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+79991234567"
                    inputmode="tel"
                    pattern="^\+7\d{10}$"
                    maxlength="12"
                    required
                    value="{{ request.form.get('phone', '') }}"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="service">Услуга</label>
                <select name="service" id="service" required>
                    <option value="">Выберите услугу</option>
                    <option value="Изготовление ключа" {% if request.form.get('service') == 'Изготовление ключа' %}selected{% endif %}>Изготовление ключа</option>
                    <option value="Программирование чип-ключа" {% if request.form.get('service') == 'Программирование чип-ключа' %}selected{% endif %}>Программирование чип-ключа</option>
                    <option value="Аварийное вскрытие автомобиля" {% if request.form.get('service') == 'Аварийное вскрытие автомобиля' %}selected{% endif %}>Аварийное вскрытие автомобиля</option>
                    <option value="Ремонт замка зажигания" {% if request.form.get('service') == 'Ремонт замка зажигания' %}selected{% endif %}>Ремонт замка зажигания</option>
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="brand-select">Марка автомобиля</label>
                <select name="brand" id="brand-select" required>
                    <option value="">Выберите марку</option>
                    {% for brand in car_brands.keys() %}
                        <option value="{{ brand }}" {% if request.form.get('brand') == brand %}selected{% endif %}>
                            {{ brand }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="model-select">Модель автомобиля</label>
                <select name="car_model" id="model-select" required>
                    <option value="">Сначала выберите марку</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Отправить заявку</button>
    </form>
</div>

<script>
    const carBrands = {{ car_brands | tojson }};
    const brandSelect = document.getElementById('brand-select');
    const modelSelect = document.getElementById('model-select');
    const selectedBrand = "{{ request.form.get('brand', '') }}";
    const selectedModel = "{{ request.form.get('car_model', '') }}";
    const phoneInput = document.getElementById('phone');

    function fillModels(brand, selected = '') {
        const models = carBrands[brand] || [];
        modelSelect.innerHTML = '<option value="">Выберите модель</option>';

        models.forEach(model => {
            const option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            if (model === selected) {
                option.selected = true;
            }
            modelSelect.appendChild(option);
        });
    }

    brandSelect.addEventListener('change', function () {
        fillModels(this.value);
    });

    phoneInput.addEventListener('input', function () {
        let value = this.value.replace(/[^\d+]/g, '');

        if (value.startsWith('8')) {
            value = '+7' + value.slice(1);
        }

        if (!value.startsWith('+7')) {
            value = '+7' + value.replace(/[^\d]/g, '').replace(/^7/, '');
        }

        value = '+7' + value.slice(2).replace(/\D/g, '').slice(0, 10);
        this.value = value;
    });

    if (selectedBrand) {
        fillModels(selectedBrand, selectedModel);
    }
</script>

{% endblock %}
