{% extends 'base.html' %}
{% block title %}Заявка | AutoKey{% endblock %}

{% block content %}
<div class="page-shell">
    <section class="content-card reveal">
        <div class="section-head">
            <h2>Оставить заявку</h2>
            <p>Заполните форму, и мы свяжемся с вами для уточнения деталей по автомобилю, ключу или выезду мастера.</p>
        </div>

        <form method="POST" class="contact-form" novalidate>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="name">Ваше имя</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Например: Илья"
                            value="{{ request.form.get('name', prefill_name or '') }}"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Телефон</label>
                    <div class="input-shell">
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+7 999 999-99-99"
                            value="{{ request.form.get('phone', prefill_phone or '') }}"
                            inputmode="numeric"
                            autocomplete="tel"
                            maxlength="18"
                            required
                        >
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-shell">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="example@mail.com"
                            value="{{ request.form.get('email', prefill_email or '') }}"
                            inputmode="email"
                            autocomplete="email"
                            pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="city">Город / район</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="city"
                            name="city"
                            placeholder="Например: Александров"
                            value="{{ request.form.get('city', '') }}"
                        >
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="brand">Марка авто</label>
                    <div class="input-shell select-shell">
                        <select id="brand" name="brand" required>
                            <option value="">Выберите марку</option>
                            {% for brand in carbrands.keys() %}
                            <option value="{{ brand }}" {% if request.form.get('brand') == brand %}selected{% endif %}>{{ brand }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="model">Модель авто</label>
                    <div class="input-shell select-shell">
                        <select id="model" name="model" required>
                            <option value="">Сначала выберите марку</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="year">Год выпуска</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="year"
                            name="year"
                            placeholder="Например: 2014"
                            value="{{ request.form.get('year', '') }}"
                            maxlength="4"
                            pattern="\d{4}"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="service">Нужная услуга</label>
                    <div class="input-shell select-shell">
                        <select id="service" name="service" required>
                            <option value="">Выберите услугу</option>
                            <option value="Изготовление ключа" {% if request.form.get('service') == 'Изготовление ключа' %}selected{% endif %}>Изготовление ключа</option>
                            <option value="Программирование чип-ключа" {% if request.form.get('service') == 'Программирование чип-ключа' %}selected{% endif %}>Программирование чип-ключа</option>
                            <option value="Аварийное вскрытие автомобиля" {% if request.form.get('service') == 'Аварийное вскрытие автомобиля' %}selected{% endif %}>Аварийное вскрытие автомобиля</option>
                            <option value="Ремонт замка зажигания" {% if request.form.get('service') == 'Ремонт замка зажигания' %}selected{% endif %}>Ремонт замка зажигания</option>
                            <option value="Другое" {% if request.form.get('service') == 'Другое' %}selected{% endif %}>Другое</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="vin">VIN / если есть</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="vin"
                            name="vin"
                            placeholder="Например: XTA210990Y1234567"
                            value="{{ request.form.get('vin', '') }}"
                            maxlength="17"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regnumber">Госномер РФ / если есть</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="regnumber"
                            name="regnumber"
                            placeholder="Например: Х940КТ777"
                            value="{{ request.form.get('regnumber', '') }}"
                            maxlength="9"
                        >
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="message">Комментарий</label>
                <div class="input-shell textarea-shell">
                    <textarea id="message" name="message" placeholder="Опишите проблему: потерян ключ, нужен дубликат, авто закрыто и т.д.">{{ request.form.get('message', '') }}</textarea>
                </div>
            </div>

            <label class="contact-policy">
                <input type="checkbox" name="policy" required {% if request.form.get('policy') %}checked{% endif %}>
                <span>
                    Я согласен с
                    <a href="{{ url_for('privacy') }}" target="_blank" rel="noopener noreferrer">Политикой конфиденциальности</a>
                    и обработкой персональных данных в соответствии с 152-ФЗ.
                </span>
            </label>

            <div class="contact-actions">
                <button type="submit" class="btn btn-primary contact-submit">Отправить заявку</button>
                <a href="{{ url_for('contacts') }}" class="btn btn-light">Связаться другим способом</a>
            </div>
        </form>
    </section>
</div>

const brandSelect = document.getElementById('brand');
const modelSelect = document.getElementById('model');
const phoneInput = document.getElementById('phone');
const emailInput = document.getElementById('email');
const vinInput = document.getElementById('vin');
const regNumberInput = document.getElementById('regnumber');

const selectedBrand = "{{ request.form.get('brand', '') }}";
const selectedModel = "{{ request.form.get('model', '') }}";

function sortModels(list) {
    return [...list].sort((a, b) => a.localeCompare(b, 'ru'));
}

function updateModels(brand, selected = "") {
    modelSelect.innerHTML = "";
    if (!brand || !carModels[brand]) {
        modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
        modelSelect.disabled = true;
        return;
    }
    modelSelect.disabled = false;
    const firstOption = document.createElement('option');
    firstOption.value = "";
    firstOption.textContent = "Выберите модель";
    modelSelect.appendChild(firstOption);
    sortModels(carModels[brand]).forEach(model => {
        const option = document.createElement('option');
        option.value = model;
        option.textContent = model;
        if (model === selected) option.selected = true;
        modelSelect.appendChild(option);
    });
}

brandSelect.addEventListener('change', function () {
    updateModels(this.value);
});

if (selectedBrand) {
    brandSelect.value = selectedBrand;
    updateModels(selectedBrand, selectedModel);
} else {
    modelSelect.disabled = true;
}

function maskPhone(value) {
    let digits = value.replace(/\D/g, "");
    if (digits.startsWith("8")) digits = "7" + digits.slice(1);
    if (!digits.startsWith("7")) digits = "7" + digits.replace(/^7*/, "");
    digits = digits.slice(0, 11);

    let result = "+7";
    if (digits.length > 1) result += " (" + digits.slice(1, 4);
    if (digits.length >= 4) result += ") " + digits.slice(4, 7);
    if (digits.length >= 7) result += "-" + digits.slice(7, 9);
    if (digits.length >= 9) result += "-" + digits.slice(9, 11);
    return result;
}

phoneInput.addEventListener('input', function () {
    this.value = maskPhone(this.value);
});

phoneInput.addEventListener('focus', function () {
    if (!this.value) this.value = '+7';
});

phoneInput.addEventListener('blur', function () {
    if (this.value === '+7') this.value = '';
});

emailInput.addEventListener('input', function () {
    this.value = this.value.replace(/[^A-Za-z0-9@._%+-]/g, '');
});

if (vinInput) {
    vinInput.addEventListener('input', function () {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '').replace(/[IOQ]/g, '').slice(0, 17);
    });
}

if (regNumberInput) {
    const mapToCyr = {
        A: 'А', B: 'В', E: 'Е', K: 'К', M: 'М',
        H: 'Н', O: 'О', P: 'Р', C: 'С', T: 'Т',
        Y: 'У', X: 'Х'
    };

    regNumberInput.addEventListener('input', function () {
        let value = this.value.toUpperCase();
        value = value.split('').map(ch => mapToCyr[ch] || ch).join('');
        value = value.replace(/[^АВЕКМНОРСТУХ0-9]/g, '').slice(0, 9);
        this.value = value;
    });
}

document.querySelector('.contact-form').addEventListener('submit', function (e) {
    const phoneDigits = phoneInput.value.replace(/\D/g, '');
    const emailValue = emailInput.value.trim();
    const vinValue = vinInput.value.trim().toUpperCase();
    const regValue = regNumberInput.value.trim().toUpperCase();

    if (phoneDigits.length !== 11) {
        e.preventDefault();
        phoneInput.focus();
        alert('Введите телефон полностью в формате +7 (999) 999-99-99');
        return;
    }

    if (emailValue && !/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(emailValue)) {
        e.preventDefault();
        emailInput.focus();
        alert('Email должен содержать только латинские буквы и корректный формат адреса');
        return;
    }

    if (vinValue && !/^[A-HJ-NPR-Z0-9-]{1,17}$/.test(vinValue)) {
        e.preventDefault();
        vinInput.focus();
        alert('VIN: только латинские буквы, цифры и дефис');
        return;
    }

    if (regValue && !/^[АВЕКМНОРСТУХ]\d{3}[АВЕКМНОРСТУХ]{2}\d{0,3}$/.test(regValue)) {
        e.preventDefault();
        regNumberInput.focus();
        alert('Госномер должен быть в формате: буква, 3 цифры, 2 буквы и до 3 цифр');
        return;
    }

    const year = document.getElementById('year').value.trim();
    if (year && !/^\d{4}$/.test(year)) {
        e.preventDefault();
        document.getElementById('year').focus();
        alert('Год выпуска должен содержать ровно 4 цифры');
    }
});
</script>

}

.contact-policy {
