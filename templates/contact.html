{% extends 'base.html' %}
{% block title %}Заявка | AutoKey{% endblock %}

{% block content %}
<div class="page-shell">
    <section class="content-card reveal">
        <div class="section-head">
            <h2>Оставить заявку</h2>
            <p>Заполните форму, и мы свяжемся с вами для уточнения деталей по автомобилю, ключу или выезду мастера.</p>
        </div>

        <form method="POST" class="contact-form" novalidate>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="name">Ваше имя</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Например: Илья"
                            value="{{ request.form.get('name', '') }}"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Телефон</label>
                    <div class="input-shell">
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+7 (___) ___-__-__"
                            value="{{ request.form.get('phone', '') }}"
                            inputmode="numeric"
                            autocomplete="tel"
                            maxlength="18"
                            required
                        >
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <div class="input-shell">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="example@mail.com"
                            value="{{ request.form.get('email', '') }}"
                            inputmode="email"
                            autocomplete="email"
                            pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}"
                            title="Используйте только латинские буквы, цифры и символы email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="city">Город / район</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="city"
                            name="city"
                            placeholder="Например: Александров"
                            value="{{ request.form.get('city', '') }}"
                        >
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="brand">Марка авто</label>
                    <div class="input-shell select-shell">
                        <select id="brand" name="brand" required>
                            <option value="">Выберите марку</option>
                            <option value="Audi">Audi</option>
                            <option value="BMW">BMW</option>
                            <option value="Chevrolet">Chevrolet</option>
                            <option value="Chery">Chery</option>
                            <option value="Citroen">Citroen</option>
                            <option value="Daewoo">Daewoo</option>
                            <option value="Ford">Ford</option>
                            <option value="Geely">Geely</option>
                            <option value="Honda">Honda</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Kia">Kia</option>
                            <option value="Lada">Lada</option>
                            <option value="Lexus">Lexus</option>
                            <option value="Mazda">Mazda</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="Mitsubishi">Mitsubishi</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Opel">Opel</option>
                            <option value="Peugeot">Peugeot</option>
                            <option value="Renault">Renault</option>
                            <option value="Skoda">Skoda</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Volkswagen">Volkswagen</option>
                            <option value="Volvo">Volvo</option>
                            <option value="Другая">Другая</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="model">Модель авто</label>
                    <div class="input-shell select-shell">
                        <select id="model" name="model" required>
                            <option value="">Сначала выберите марку</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="year">Год выпуска</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="year"
                            name="year"
                            placeholder="Например: 2014"
                            value="{{ request.form.get('year', '') }}"
                            inputmode="numeric"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="service">Нужная услуга</label>
                    <div class="input-shell select-shell">
                        <select id="service" name="service" required>
                            <option value="">Выберите услугу</option>
                            <option value="Изготовление ключа">Изготовление ключа</option>
                            <option value="Программирование ключа">Программирование ключа</option>
                            <option value="Вскрытие автомобиля">Вскрытие автомобиля</option>
                            <option value="Ремонт корпуса ключа">Ремонт корпуса ключа</option>
                            <option value="Замена батарейки">Замена батарейки</option>
                            <option value="Отключение утерянных ключей">Отключение утерянных ключей</option>
                            <option value="Аварийный выезд">Аварийный выезд</option>
                            <option value="Другое">Другое</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="vin">VIN / если есть</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="vin"
                            name="vin"
                            placeholder="Например: XTA..."
                            value="{{ request.form.get('vin', '') }}"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg_number">Госномер / если есть</label>
                    <div class="input-shell">
                        <input
                            type="text"
                            id="reg_number"
                            name="reg_number"
                            placeholder="Например: А123АА33"
                            value="{{ request.form.get('reg_number', '') }}"
                        >
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="message">Комментарий</label>
                <div class="input-shell textarea-shell">
                    <textarea
                        id="message"
                        name="message"
                        placeholder="Опишите проблему: потерян ключ, нужен дубликат, авто закрыто и т.д."
                    >{{ request.form.get('message', '') }}</textarea>
                </div>
            </div>

            <label class="contact-policy">
                <input type="checkbox" name="policy" required>
                <span>
                    Я согласен с
                    <a href="{{ url_for('privacy') }}">Политикой конфиденциальности</a>
                    и даю согласие на обработку персональных данных.
                </span>
            </label>

            <div class="contact-actions">
                <button type="submit" class="btn btn-primary contact-submit">Отправить заявку</button>
                <a href="{{ url_for('contacts') }}" class="btn btn-light">Связаться другим способом</a>
            </div>
        </form>
    </section>
</div>

<script>
const carModels = {
    "Audi": ["A3", "A4", "A5", "A6", "A7", "A8", "Q3", "Q5", "Q7", "Q8", "TT"],
    "BMW": ["1 Series", "3 Series", "5 Series", "7 Series", "X1", "X3", "X5", "X6"],
    "Chevrolet": ["Aveo", "Cruze", "Lacetti", "Captiva", "Niva"],
    "Chery": ["Amulet", "Tiggo 4", "Tiggo 7", "Tiggo 8", "Arrizo"],
    "Citroen": ["C3", "C4", "C5", "Berlingo", "Jumper"],
    "Daewoo": ["Matiz", "Nexia", "Lanos", "Espero"],
    "Ford": ["Focus", "Fiesta", "Mondeo", "Kuga", "Transit"],
    "Geely": ["Coolray", "Atlas", "Emgrand", "Tugella"],
    "Honda": ["Civic", "Accord", "CR-V", "Fit", "Pilot"],
    "Hyundai": ["Accent", "Elantra", "Solaris", "Creta", "Santa Fe", "Tucson"],
    "Kia": ["Rio", "Ceed", "Cerato", "Sportage", "Sorento", "Optima"],
    "Lada": ["Granta", "Vesta", "Kalina", "Priora", "Largus", "Niva"],
    "Lexus": ["ES", "GS", "GX", "IS", "LX", "NX", "RX"],
    "Mazda": ["Mazda 3", "Mazda 6", "CX-5", "CX-7", "CX-9"],
    "Mercedes-Benz": ["A-Class", "C-Class", "E-Class", "S-Class", "GLA", "GLC", "GLE", "Sprinter"],
    "Mitsubishi": ["Lancer", "Outlander", "ASX", "Pajero", "L200"],
    "Nissan": ["Almera", "Qashqai", "X-Trail", "Note", "Teana", "Patrol"],
    "Opel": ["Astra", "Corsa", "Insignia", "Vectra", "Zafira"],
    "Peugeot": ["206", "207", "308", "407", "3008", "Partner"],
    "Renault": ["Logan", "Sandero", "Duster", "Megane", "Fluence", "Kaptur"],
    "Skoda": ["Fabia", "Octavia", "Rapid", "Superb", "Kodiaq", "Yeti"],
    "Toyota": ["Camry", "Corolla", "Avensis", "RAV4", "Land Cruiser", "Prado"],
    "Volkswagen": ["Polo", "Golf", "Passat", "Jetta", "Tiguan", "Touareg"],
    "Volvo": ["S40", "S60", "S80", "XC60", "XC70", "XC90"],
    "Другая": ["Укажу в комментарии"]
};

const brandSelect = document.getElementById('brand');
const modelSelect = document.getElementById('model');
const phoneInput = document.getElementById('phone');
const emailInput = document.getElementById('email');

const selectedBrand = "{{ request.form.get('brand', '') }}";
const selectedModel = "{{ request.form.get('model', '') }}";

function updateModels(brand, selected = "") {
    modelSelect.innerHTML = "";

    if (!brand || !carModels[brand]) {
        modelSelect.innerHTML = '<option value="">Сначала выберите марку</option>';
        return;
    }

    const firstOption = document.createElement('option');
    firstOption.value = "";
    firstOption.textContent = "Выберите модель";
    modelSelect.appendChild(firstOption);

    carModels[brand].forEach(model => {
        const option = document.createElement('option');
        option.value = model;
        option.textContent = model;
        if (model === selected) option.selected = true;
        modelSelect.appendChild(option);
    });
}

brandSelect.addEventListener('change', function () {
    updateModels(this.value);
});

if (selectedBrand) {
    brandSelect.value = selectedBrand;
    updateModels(selectedBrand, selectedModel);
}

function maskPhone(value) {
    let digits = value.replace(/\D/g, '');

    if (digits.startsWith('8')) digits = '7' + digits.slice(1);
    if (!digits.startsWith('7')) digits = '7' + digits.replace(/^7*/, '');
    digits = digits.slice(0, 11);

    let result = '+7';
    if (digits.length > 1) result += ' (' + digits.slice(1, 4);
    if (digits.length >= 4) result += ') ' + digits.slice(4, 7);
    if (digits.length >= 7) result += '-' + digits.slice(7, 9);
    if (digits.length >= 9) result += '-' + digits.slice(9, 11);

    return result;
}

phoneInput.addEventListener('input', function () {
    this.value = maskPhone(this.value);
});

phoneInput.addEventListener('focus', function () {
    if (!this.value) this.value = '+7';
});

phoneInput.addEventListener('blur', function () {
    if (this.value === '+7') this.value = '';
});

emailInput.addEventListener('input', function () {
    this.value = this.value.replace(/[^A-Za-z0-9@._%+-]/g, '');
});

document.querySelector('.contact-form').addEventListener('submit', function (e) {
    const phoneDigits = phoneInput.value.replace(/\D/g, '');
    const emailValue = emailInput.value.trim();

    if (phoneDigits.length !== 11) {
        e.preventDefault();
        phoneInput.focus();
        alert('Введите телефон полностью в формате +7 (999) 999-99-99');
        return;
    }

    if (emailValue && !/^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(emailValue)) {
        e.preventDefault();
        emailInput.focus();
        alert('Email должен содержать только латинские буквы и корректный формат адреса');
    }
});
</script>

<style>
.contact-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.contact-form .form-group {
    margin-bottom: 0;
}

.input-shell {
    display: flex;
    align-items: center;
    min-height: 58px;
    border-radius: 18px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    transition: var(--transition);
    overflow: hidden;
    backdrop-filter: blur(14px);
}

.input-shell:focus-within {
    border-color: rgba(21,209,197,.35);
    box-shadow: 0 0 0 4px rgba(21,209,197,.10);
    background: rgba(255,255,255,.08);
}

.input-shell input,
.input-shell select,
.input-shell textarea {
    width: 100%;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    background-color: transparent !important;
    color: #f3f7ff !important;
    box-shadow: none !important;
    padding: 16px 18px !important;
    font-size: 16px;
}

.input-shell select {
    cursor: pointer;
    color: #f3f7ff !important;
}

.input-shell select option {
    background: #0d1b2d;
    color: #f3f7ff;
}

.input-shell textarea {
    min-height: 140px;
    resize: vertical;
}

.textarea-shell {
    align-items: stretch;
}

.contact-policy {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    color: rgba(255,255,255,.76);
    line-height: 1.6;
    margin-top: 4px;
}

.contact-policy input {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    accent-color: #1bd3d0;
    flex-shrink: 0;
}

.contact-policy a {
    color: #9fc5ff;
    text-decoration: underline;
    text-underline-offset: 3px;
}

.contact-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 6px;
}

.contact-submit {
    min-height: 56px;
    padding-inline: 26px;
}

@media (max-width: 768px) {
    .contact-actions {
        flex-direction: column;
    }

    .contact-actions .btn,
    .contact-actions button {
        width: 100%;
        justify-content: center;
    }
}
</style>
{% endblock %}
